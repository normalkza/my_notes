<!DOCTYPE html> 
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成电大学英语词汇训练系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .unit-selector {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .unit-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .unit-btn {
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .unit-btn:hover, .unit-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .question-number {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        .progress {
            flex: 1;
            margin: 0 20px;
            background: #f0f0f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #333;
        }

        .question-translation {
            font-size: 1.1em;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #666;
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            flex-direction: column;
            align-items: flex-start;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #4CAF50;
            background: #4CAF50;
            color: white;
        }

        .option.incorrect {
            border-color: #f44336;
            background: #f44336;
            color: white;
        }

        .option-main {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;
        }

        .option input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }

        .option-translation {
            font-size: 0.9em;
            opacity: 0.8;
            margin-left: 35px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #545b62;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .score-display {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .hidden {
            display: none;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🎓 成电大学英语词汇训练</h1>
            <p>2025级大一下学期 • 慕课词汇专项练习</p>
        </div>

        <!-- 单元选择器 -->
        <div class="unit-selector">
            <h3>📚 选择练习单元</h3>
            <div class="unit-buttons">
                <button class="unit-btn active" data-unit="U1">U1</button>
                <button class="unit-btn" data-unit="U2">U2</button>
                <button class="unit-btn" data-unit="U3">U3</button>
                <button class="unit-btn" data-unit="U4">U4</button>
                <button class="unit-btn" data-unit="U5">U5</button>
                <button class="unit-btn" data-unit="U6">U6</button>
                <button class="unit-btn" data-unit="U7">U7</button>
                <button class="unit-btn" data-unit="U8">U8</button>
                <button class="unit-btn" data-unit="U9">U9</button>
                <button class="unit-btn" data-unit="U10">U10</button>
                <button class="unit-btn" data-unit="U11">U11</button>
                <button class="unit-btn" data-unit="U12">U12</button>
            </div>
        </div>

        <!-- 答题区域 -->
        <div class="quiz-container" id="quizContainer">
            <div class="question-header">
                <div class="question-number" id="questionNumber">题目 1/15</div>
                <div class="progress">
                    <div class="progress-bar" id="progressBar" style="width: 6.67%"></div>
                </div>
                <div class="score-info">当前单元: <span id="currentUnit">U1</span></div>
            </div>

            <div class="question-text" id="questionText">
                Loading question...
            </div>

            <div class="question-translation hidden" id="questionTranslation">
                题目翻译将在这里显示...
            </div>

            <div class="options" id="optionsContainer">
                <!-- 选项将由JavaScript动态生成 -->
            </div>

            <div class="feedback hidden" id="feedback"></div>

            <div class="controls">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">⬅️ 上一题</button>
                <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">提交答案</button>
                <button class="btn btn-primary hidden" id="nextBtn" onclick="nextQuestion()">下一题 ➡️</button>
            </div>
        </div>

        <!-- 结果显示 -->
        <div class="result-container hidden" id="resultContainer">
            <h2>🎉 答题完成！</h2>
            <div class="score-display" id="finalScore">0/15</div>
            <p id="scorePercentage">正确率: 0%</p>
            <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top: 20px;">重新开始</button>
        </div>
    </div>

    <script>

    const questionBank = {
    // ======================= U1 (基于词汇测试1解析) =======================
    U1: [
        { "question": "There are only two powers in the world, the sword and the pen; and in the end the former is always conquered by the ______.", "options": ["A. late", "B. later", "C. latter", "D. latest"], "correct": 2, "translation": "世界上只有两种力量，剑和笔；最后前者总是被后者征服。", "optionsTranslation": ["晚期的，迟的", "较晚的，以后的", "后者的", "最新的"] },
        { "question": "The night sky ______ with countless beautiful stars, creating a breathtaking view that filled their hearts with awe and wonder.", "options": ["A. glanced", "B. glimpsed", "C. glided", "D. glittered"], "correct": 3, "translation": "夜空中闪烁着无数美丽的星星，形成了一种令人惊叹的景象，让他们心中充满了敬畏和好奇。", "optionsTranslation": ["一瞥，看一眼", "一瞥，一看", "滑行，滑动", "闪光，闪烁"] },
        { "question": "In a hurry to leave the room, Nancy ______ her backpack and put some books and stuff inside it.", "options": ["A. gripped", "B. grinned", "C. grabbed", "D. grinded"], "correct": 2, "translation": "南希急于离开房间，抓起背包，放了一些书和东西进去。", "optionsTranslation": ["握紧，夹住", "露齿而笑", "攫取，抓住", "磨碎，碾碎"] },
        { "question": "Global environmental problems, such as global warming and ocean pollution, should be dealt with through international cooperation, rather than ______ action.", "options": ["A. unilateral", "B. bilateral", "C. multilateral", "D. collateral"], "correct": 0, "translation": "全球变暖和海洋污染等全球环境问题应该通过国际合作而不是单方面行动来解决。", "optionsTranslation": ["单方的，单边的", "双方的，双边的", "多国的，多边的", "附属的，次要的"] },
        { "question": "The debater calmly and confidently ______ the opponent's claim with logical reasoning and supporting evidence.", "options": ["A. refused", "B. refuted", "C. rejected", "D. resisted"], "correct": 1, "translation": "辩手冷静而自信地用逻辑推理和支持证据来反驳对手的说法。", "optionsTranslation": ["拒绝，回绝", "驳斥，批驳", "拒绝，否决", "阻挡，抵制"] },
        { "question": "Although it was tough, the negotiation about the border has been conducted ______ a positive manner.", "options": ["A. By", "B. To", "C. At", "D. In"], "correct": 3, "translation": "尽管这很艰难，但关于边界的谈判一直以积极的方式进行。", "optionsTranslation": ["通过", "到", "在", "以...的方式"] },
        { "question": "Unexpectedly, the judge has issued a warrant ______ the arrest of the suspect.", "options": ["A. Against", "B. For", "C. To", "D. At"], "correct": 1, "translation": "出乎意料的是，法官签发了逮捕嫌疑犯的逮捕令。", "optionsTranslation": ["反对", "为了", "给", "在"] },
        { "question": "After years of preparation and training, the team began their expedition ______ earnest, determined to conquer the highest mountain of the area.", "options": ["A. Of", "B. For", "C. At", "D. In"], "correct": 1, "translation": "经过多年的准备和训练，这支队伍开始了认真的探险，决心征服该地区的最高山峰。", "optionsTranslation": ["的", "为了", "在", "在"] },
        { "question": "The artist always tried breaking ______ convention in everything she made, ignoring all the accepted norms of her contemporaries.", "options": ["A. Down", "B. Into", "C. Away", "D. With"], "correct": 3, "translation": "这位艺术家在创作的每一件作品中都试图打破传统，忽视了同时代人所有公认的规范。", "optionsTranslation": ["分解，拆开", "闯入，破门而入", "脱离，放弃", "破除，与...决裂"] },
        { "question": "The public is accusing this company of having prejudice ______ the female workforce.", "options": ["A. Against", "B. Over", "C. For", "D. To"], "correct": 0, "translation": "公众指责这家公司对女性员工有偏见。", "optionsTranslation": ["反对", "超过", "支持", "给"] },
        { "question": "The [fall] in the number of heart disease is largely due to the measures taken by governments in diet.", "options": ["A. Decline", "B. Decay", "C. Defeat", "D. Deposit"], "correct": 0, "translation": "心脏病数量的下降主要是由于政府在饮食方面采取的措施。", "optionsTranslation": ["减少，下降", "腐烂，腐朽", "失败，挫败", "沉积物，存款"] },
        { "question": "The employees on oil drilling platforms are given quite decent salaries, but we are worried that the [isolated] working environment could lead to psychological problems.", "options": ["A. Unsociable", "B. Unbearable", "C. Enclosed", "D. Entailed"], "correct": 2, "translation": "石油钻井平台上的员工薪水相当不错，但我们担心孤立的工作环境可能导致心理问题。", "optionsTranslation": ["不爱交际的", "难以忍受的", "与外界隔绝的，封闭的", "被牵涉到的"] },
        { "question": "There appears to be another [outbreak] of sickness among the animals living in the rainforest.", "options": ["A. Outcome", "B. Outset", "C. Outlook", "D. Outburst"], "correct": 3, "translation": "生活在热带雨林中的动物似乎又爆发了一次疾病。", "optionsTranslation": ["结果，效果", "开始，开端", "观点，前景", "爆发，激增"] },
        { "question": "The forthcoming [fortnight] presents the first major test for the new young CEO of the company.", "options": ["A. One week", "B. One month", "C. Two weeks", "D. Two months"], "correct": 2, "translation": "即将到来的两周是对公司新任年轻首席执行官的第一次重大考验。", "optionsTranslation": ["一周", "一个月", "两周", "两个月"] },
        { "question": "Shenzhen, a small seaside village in Guangdong Province, has [mushroomed] to a crowded city of over 10 million people in the past four decades.", "options": ["A. Suddenly shrank", "B. Quickly developed", "C. Immediately converted", "D. Completely assembled"], "correct": 1, "translation": "深圳是广东省的一个海滨小村庄，在过去的四十年里，它迅速发展成为一个拥有1000多万人口的拥挤城市。", "optionsTranslation": ["突然萎缩", "迅速发展", "立即转换/转变", "完全组装"] }
    ],

    // ======================= U2 (基于词汇测试2解析) =======================
    U2: [
        { "question": "Since John was a child, he had always ______ to become the first black president of his country.", "options": ["A. Conspired", "B. Aspired", "C. Inspired", "D. Expired"], "correct": 1, "translation": "约翰从小就立志要成为美国第一位黑人总统。", "optionsTranslation": ["密谋，共谋", "渴望，有志", "激励，鼓舞", "到期，失效"] },
        { "question": "The hikers reached the summit after a challenging climb, where they were rewarded with breathtaking views of the surrounding landscape from the high ______.", "options": ["A. Elevator", "B. Elevation", "C. Escalator", "D. Escalation"], "correct": 1, "translation": "徒步旅行者在经历了一次富有挑战性的攀登后登上了顶峰，在那里他们可以从高海拔欣赏到周围风景的壮丽景色。", "optionsTranslation": ["电梯", "高度，海拔", "自动扶梯", "迅速增加，升级"] },
        { "question": "There is an apparent ______ between the needs of workers and those of bosses, thus conflicts arise every now and then.", "options": ["A. Contradiction", "B. Contract", "C. Contribution", "D. Contraction"], "correct": 0, "translation": "工人的需求和老板的需求之间存在着明显的矛盾，因此冲突时有发生。", "optionsTranslation": ["矛盾，不一致", "合同，契约", "贡献，促成作用", "收缩，缩小"] },
        { "question": "It's difficult to be enrolled in that university, which means it will ______ all the students who fail to reach its requirements.", "options": ["A. Include", "B. Conclude", "C. Exclude", "D. Clue"], "correct": 2, "translation": "很难被那所大学录取，这意味着它将排除所有达不到要求的学生。", "optionsTranslation": ["包含", "断定，结束", "排除", "给...提供线索"] },
        { "question": "The boss ______ that Lily was responsible for the mistake, but it turned out that he was wrong.", "options": ["A. Resumed", "B. Consumed", "C. Presumed", "D. Costumed"], "correct": 2, "translation": "老板认为莉莉应该为这个错误负责，但事实证明他错了。", "optionsTranslation": ["恢复", "消耗", "料想，假设", "给...穿上特定服装"] },
        { "question": "Quite many adolescents nowadays constrain themselves ______ expressing true feelings to their parents due to the generation gap.", "options": ["A. In", "B. From", "C. By", "D. Through"], "correct": 1, "translation": "如今，许多青少年由于代沟而限制自己向父母表达真实感受。", "optionsTranslation": ["在", "从", "通过", "通过"] },
        { "question": "Many flight attendants, despite the initial excitement and enthusiasm of travelling around the world, gradually grow ______ flights.", "options": ["A. Out of", "B. Weary of", "C. Away from", "D. Apart from"], "correct": 1, "translation": "许多乘务员，尽管最初对环游世界感到兴奋和热情，但逐渐对飞行感到厌倦。", "optionsTranslation": ["没有，离开", "对...感到厌倦", "离开", "分开，不同于"] },
        { "question": "Readers familiar ______ English literature will find this movie contains a lot of elements from Shakespeare's works.", "options": ["A. In", "B. At", "C. To", "D. With"], "correct": 3, "translation": "熟悉英国文学的读者会发现这部电影包含了许多莎士比亚作品的元素。", "optionsTranslation": ["在", "在", "到", "与"] },
        { "question": "The orange used for this drink is a branch of the sweet oranges that are indigenous ______ East Asia.", "options": ["A. In", "B. Of", "C. To", "D. With"], "correct": 2, "translation": "这种饮料所用的橙子是原产于东亚的甜橙的一个分支。", "optionsTranslation": ["在", "的", "到", "与"] },
        { "question": "The show is very important so the fashion designer is very particular ______ the colors they choose.", "options": ["A. For", "B. In", "C. To", "D. About"], "correct": 3, "translation": "这场时装秀非常重要，所以时装设计师对他们选择的颜色非常挑剔。", "optionsTranslation": ["为了", "在", "到", "关于"] },
        { "question": "The [famous] artist's latest masterpiece fascinated audience around the world.", "options": ["A. Notorious", "B. Renowned", "C. Fashionable", "D. Outdated"], "correct": 1, "translation": "这位著名艺术家的最新杰作吸引了全世界的观众。", "optionsTranslation": ["臭名昭著的", "有名的，受尊敬的", "流行的，时髦的", "过时的"] },
        { "question": "For almost all its history, the study of modular arithmetic has been driven purely by its [inherent] beauty and by human curiosity.", "options": ["A. Intricate", "B. Intrinsic", "C. Intuitive", "D. Intriguing"], "correct": 1, "translation": "在其几乎所有的历史中，模算术的研究都纯粹是由其固有的美和人类的好奇心驱动的。", "optionsTranslation": ["错综复杂的", "固有的，内在的", "直觉的", "引人入胜的"] },
        { "question": "As a senior clerk of the company, most of his jobs are essentially desk-bound, and [clerical] or managerial in nature.", "options": ["A. Numerical", "B. Administrative", "C. Academic", "D. Technical"], "correct": 1, "translation": "作为公司的高级职员，他的大部分工作基本上都是伏案工作，属于文书或管理性质。", "optionsTranslation": ["数字的", "管理的，行政的", "学术的", "技术的"] },
        { "question": "You do not need a thorough change, but you will need to [refine] some of your teaching methods.", "options": ["A. Implement", "B. Alter", "C. Improve", "D. Apply"], "correct": 2, "translation": "你不需要彻底的改变，但你需要完善一些教学方法。", "optionsTranslation": ["实施，执行", "改变，更改", "改进，改善", "申请，应用"] },
        { "question": "Joe, the youngest child in the family, is undoubtedly [the apple of his parents' eye].", "options": ["A. His parents' apple", "B. His parents' treasure", "C. His parents' eye", "D. His parents' property"], "correct": 1, "translation": "乔是家里最小的孩子，无疑是父母的掌上明珠。", "optionsTranslation": ["父母的苹果", "父母的宝贝", "父母的眼睛", "父母的财产"] }
    ],

    // ======================= U3 (基于词汇测试3解析) =======================
    U3: [
        { "question": "Despite the reported looming prospect, the CEO expresses the cautious ______ about the investment.", "options": ["A. Optimism", "B. Optimum", "C. Optimist", "D. Optician"], "correct": 0, "translation": "尽管有报道称前景迫在眉睫，但首席执行官对这项投资表示谨慎乐观。", "optionsTranslation": ["乐观", "最佳条件", "乐观主义者", "眼镜商"] },
        { "question": "Generally speaking, young people tend to be more aggressive while the old are more ______.", "options": ["A. Conserve", "B. Conservative", "C. Conservation", "D. Conserving"], "correct": 1, "translation": "一般来说，年轻人往往更具攻击性，而老年人则更保守。", "optionsTranslation": ["保护，保存", "保守的", "保护，保存", "保存"] },

        // 全局变量
        let currentUnit = 'U1';
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let score = 0;
        let answered = false;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeQuiz();
            setupUnitSelector();
        });

        function setupUnitSelector() {
            const unitButtons = document.querySelectorAll('.unit-btn');
            unitButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有active类
                    unitButtons.forEach(b => b.classList.remove('active'));
                    // 添加active类到当前按钮
                    this.classList.add('active');
                    
                    // 切换单元
                    currentUnit = this.dataset.unit;
                    resetQuiz();
                    loadQuestion();
                });
            });
        }

        function initializeQuiz() {
            resetQuiz();
            loadQuestion();
        }

        function resetQuiz() {
            currentQuestionIndex = 0;
            userAnswers = [];
            score = 0;
            answered = false;
            document.getElementById('resultContainer').classList.add('hidden');
            document.getElementById('quizContainer').classList.remove('hidden');
        }

        function loadQuestion() {
            const questions = questionBank[currentUnit];
            if (!questions || currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            const question = questions[currentQuestionIndex];
            
            // 更新题目信息
            document.getElementById('currentUnit').textContent = currentUnit;
            document.getElementById('questionNumber').textContent = `题目 ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('questionText').textContent = question.question;
            
            // 隐藏翻译
            document.getElementById('questionTranslation').classList.add('hidden');
            
            // 更新进度条
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            // 生成选项
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.innerHTML = `
                    <div class="option-main">
                        <input type="radio" name="answer" value="${index}" id="option${index}">
                        <label for="option${index}">${option}</label>
                    </div>
                    <div class="option-translation hidden">${question.optionsTranslation[index]}</div>
                `;
                optionDiv.addEventListener('click', function() {
                    document.getElementById(`option${index}`).checked = true;
                    // 移除其他选项的选中状态
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    // 添加当前选项的选中状态
                    this.classList.add('selected');
                });
                optionsContainer.appendChild(optionDiv);
            });
            
            // 重置状态
            answered = false;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('submitBtn').classList.remove('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
        }

           function submitAnswer() {
            if (answered) return;
            
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            if (!selectedOption) {
                alert('请选择一个答案！');
                return;
            }
            
            const userAnswer = parseInt(selectedOption.value);
            const question = questionBank[currentUnit][currentQuestionIndex];
            const isCorrect = userAnswer === question.correct;
            
            userAnswers[currentQuestionIndex] = userAnswer;
            answered = true;
            
            // 显示题目翻译
            document.getElementById('questionTranslation').textContent = question.translation;
            document.getElementById('questionTranslation').classList.remove('hidden');
            
            // 显示正确答案和选项翻译
            const options = document.querySelectorAll('.option');
            options.forEach((option, index) => {
                const translationDiv = option.querySelector('.option-translation');
                translationDiv.classList.remove('hidden');
                
                if (index === question.correct) {
                    option.classList.add('correct');
                } else if (index === userAnswer && !isCorrect) {
                    option.classList.add('incorrect');
                }
                option.style.pointerEvents = 'none';
            });
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            if (isCorrect) {
                feedback.className = 'feedback correct';
                feedback.textContent = '✅ 回答正确！';
                score++;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.textContent = `❌ 回答错误。正确答案是: ${question.options[question.correct]}`;
            }
            
            // 切换按钮
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function showResults() {
            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('resultContainer').classList.remove('hidden');
            
            const totalQuestions = questionBank[currentUnit].length;
            const percentage = Math.round((score / totalQuestions) * 100);
            
            document.getElementById('finalScore').textContent = `${score}/${totalQuestions}`;
            document.getElementById('scorePercentage').textContent = `正确率: ${percentage}%`;
        }

        function restartQuiz() {
            resetQuiz();
            loadQuestion();
        }
    </script>
